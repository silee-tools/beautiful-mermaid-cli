name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build standalone binaries (cross-compile)
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile bmm
          tar czf bmm-${TAG}-darwin-arm64.tar.gz bmm && rm bmm

          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile bmm
          tar czf bmm-${TAG}-darwin-amd64.tar.gz bmm && rm bmm

          bun build src/cli.ts --compile --target=bun-linux-x64 --outfile bmm
          tar czf bmm-${TAG}-linux-amd64.tar.gz bmm && rm bmm

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            bmm-*.tar.gz

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          SHA_DARWIN_ARM64=$(sha256sum bmm-${TAG}-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(sha256sum bmm-${TAG}-darwin-amd64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(sha256sum bmm-${TAG}-linux-amd64.tar.gz | cut -d' ' -f1)

          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update the Homebrew tap" >&2
            exit 1
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/silee-tools/homebrew-tap.git" homebrew-tap

          cat > homebrew-tap/Formula/bmm.rb <<'FORMULA'
          class Bmm < Formula
            desc "A thin CLI wrapper around beautiful-mermaid for rendering Mermaid diagrams"
            homepage "https://github.com/silee-tools/beautiful-mermaid-cli"
          FORMULA

          cat >> homebrew-tap/Formula/bmm.rb << FORMULA
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/silee-tools/beautiful-mermaid-cli/releases/download/${TAG}/bmm-${TAG}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/silee-tools/beautiful-mermaid-cli/releases/download/${TAG}/bmm-${TAG}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/silee-tools/beautiful-mermaid-cli/releases/download/${TAG}/bmm-${TAG}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "bmm"
            end

            test do
              assert_match "bmm", shell_output("#{bin}/bmm --help")
            end
          end
          FORMULA

          sed -i 's/^          //' homebrew-tap/Formula/bmm.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bmm.rb
          git commit -m "bmm: update to ${TAG}"
          git push
