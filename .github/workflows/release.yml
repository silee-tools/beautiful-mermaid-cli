name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer bump to apply when version is empty"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Explicit version, with or without leading v"
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CLI smoke check
        run: bun run src/cli.ts --help

      - name: Resolve release version
        id: version
        env:
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "${latest_tag}" ]; then
            latest_tag="v0.0.0"
          fi
          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${current}"

          bump="${INPUT_BUMP:-patch}"
          requested="${INPUT_VERSION:-}"

          if [ -n "${requested}" ]; then
            version="${requested#v}"
          else
            case "${bump}" in
              patch) version="${major}.${minor}.$((patch + 1))" ;;
              minor) version="${major}.$((minor + 1)).0" ;;
              major) version="$((major + 1)).0.0" ;;
              *) echo "Unsupported bump '${bump}'. Use patch, minor, major, or provide version." >&2; exit 1 ;;
            esac
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '${version}'. Expected MAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists." >&2
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build standalone binaries
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile bmm
          tar czf bmm-${TAG}-darwin-arm64.tar.gz bmm && rm bmm

          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile bmm
          tar czf bmm-${TAG}-darwin-amd64.tar.gz bmm && rm bmm

          bun build src/cli.ts --compile --target=bun-linux-x64 --outfile bmm
          tar czf bmm-${TAG}-linux-amd64.tar.gz bmm && rm bmm

      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            bmm-*.tar.gz

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          SHA_DARWIN_ARM64=$(sha256sum bmm-${TAG}-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(sha256sum bmm-${TAG}-darwin-amd64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(sha256sum bmm-${TAG}-linux-amd64.tar.gz | cut -d' ' -f1)

          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update the Homebrew tap" >&2
            exit 1
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/silee-tools/homebrew-tap.git" homebrew-tap

          cat > homebrew-tap/Formula/bmm.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class Bmm < Formula
            desc "A thin CLI wrapper around beautiful-mermaid for rendering Mermaid diagrams"
            homepage "https://github.com/silee-tools/beautiful-mermaid-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/silee-tools/beautiful-mermaid-cli/releases/download/${TAG}/bmm-${TAG}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/silee-tools/beautiful-mermaid-cli/releases/download/${TAG}/bmm-${TAG}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/silee-tools/beautiful-mermaid-cli/releases/download/${TAG}/bmm-${TAG}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "bmm"
            end

            test do
              assert_match "bmm", shell_output("#{bin}/bmm --help")
            end
          end
          FORMULA
          sed -i 's/^          //' homebrew-tap/Formula/bmm.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bmm.rb
          git diff --cached --quiet || { git commit -m "bmm: update to ${TAG}" && git push; }
